<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird - Rust WASM</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #333;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 4px solid #fff;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <canvas id="game-canvas" width="480" height="640"></canvas>
    <script type="module">
        import init, { Game } from './pkg/flappy_bird.js';

        async function run() {
            await init();
            
            const game = new Game("game-canvas");
            
            function gameLoop() {
                game.update();
                game.draw();
                requestAnimationFrame(gameLoop);
            }
            
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (game.is_game_over()) {
                        game.reset();
                    } else {
                        game.jump();
                    }
                }
            });
            
            document.addEventListener('click', () => {
                if (game.is_game_over()) {
                    game.reset();
                } else {
                    game.jump();
                }
            });
            
            gameLoop();
        }
        
        run();
    </script>
</body>
</html>
